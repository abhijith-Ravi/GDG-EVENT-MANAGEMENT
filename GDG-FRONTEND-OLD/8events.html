<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add New Event</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #2563eb 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .form-container {
      width: min(100%, 440px);
      background: rgba(255,255,255,0.96);
      padding: 28px;
      border-radius: 24px;
      box-shadow: 0 20px 45px rgba(15, 23, 42, 0.22);
    }

    .form-title { margin: 0 0 8px; color: #111827; }
    .helper { color: #4b5563; margin-bottom: 16px; }
    .form-group { margin-bottom: 12px; }
    label { display: block; margin-bottom: 6px; font-weight: 600; }
    input, textarea { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 12px; }
    .submit-button, .back-button {
      width: 100%; padding: 12px 14px; margin-top: 8px; border: 0; border-radius: 999px; font-weight: 700; cursor: pointer;
    }
    .submit-button { background: linear-gradient(135deg, #2563eb, #14b8a6); color: white; }
    .back-button { background: #e5e7eb; color: #111827; }
  </style>
</head>
<body>
  <div class="form-container">
    <h2 class="form-title">Create a new GDG event</h2>
    <p class="helper">Share your next workshop, meetup, or hack session with the community.</p>
    <form id="event-form">
      <div class="form-group">
        <label for="event_name">Event Name</label>
        <input type="text" id="event_name" name="event_name" required>
      </div>
      <div class="form-group">
        <label for="date">Date & Time</label>
        <input type="datetime-local" id="date" name="date" required>
      </div>
      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" name="description" rows="4" required></textarea>
      </div>
      <div class="form-group">
        <label for="location">Location</label>
        <input type="text" id="location" name="location" required>
      </div>
      <button type="submit" class="submit-button">Add Event</button>
      <button type="button" class="back-button" onclick="goBack()">Back</button>
    </form>
  </div>

  <script>
    function goBack() { window.history.back(); }

    document.getElementById('event-form').addEventListener('submit', async function(event) {
      event.preventDefault();
      const eventData = {
        event_name: document.getElementById('event_name').value,
        date: document.getElementById('date').value,
        description: document.getElementById('description').value,
        location: document.getElementById('location').value
      };

      try {
        const response = await fetch('http://localhost:8080/api/events', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
          body: JSON.stringify(eventData)
        });

        if (response.ok) {
          alert('Event added successfully!');
          document.getElementById('event-form').reset();
        } else {
          throw new Error(`Error adding event: ${response.status} ${response.statusText}`);
        }
      } catch (error) {
        console.error('Failed to add event:', error);
        alert('Failed to add event. Please try again later.');
      }
    });
  </script>
</body>
</html>
