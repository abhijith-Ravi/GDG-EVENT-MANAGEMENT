<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GDG Event Registration</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #f8fbff 0%, #eef4ff 100%);
      color: #10213a;
    }

    .page-shell {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    .hero-card, .modal-content, .event-card {
      background: rgba(255,255,255,0.95);
      border: 1px solid rgba(15, 23, 42, 0.08);
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
    }

    .hero-card {
      padding: 24px;
      border-radius: 24px;
      margin-bottom: 20px;
    }

    .hero-card h1 { margin: 0 0 8px; }
    .hero-card p { color: #60708d; margin: 0; }

    .back-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 16px;
      margin-bottom: 16px;
      border: 0;
      border-radius: 999px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-weight: 700;
    }

    .events-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    .event-card {
      padding: 18px;
      border-radius: 20px;
    }

    .event-card h3 { margin: 0 0 8px; }
    .event-card p { color: #60708d; line-height: 1.6; margin: 0 0 8px; }
    .register-button {
      margin-top: 8px;
      padding: 10px 14px;
      border: 0;
      border-radius: 999px;
      background: linear-gradient(135deg, #2563eb, #14b8a6);
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      align-items: center;
      justify-content: center;
      background: rgba(8,15,32,0.6);
      padding: 16px;
      z-index: 20;
    }

    .modal-content {
      width: min(100%, 480px);
      padding: 24px;
      border-radius: 24px;
      position: relative;
    }

    .close {
      position: absolute;
      top: 12px;
      right: 14px;
      font-size: 1.3rem;
      cursor: pointer;
    }

    .form-group { margin-bottom: 10px; }
    label { display: block; margin-bottom: 6px; font-weight: 600; }
    input, select { width: 100%; padding: 10px 12px; border: 1px solid rgba(15, 23, 42, 0.12); border-radius: 12px; }
    button[type="submit"] { width: 100%; margin-top: 8px; padding: 12px; border: 0; border-radius: 999px; background: #2563eb; color: white; font-weight: 700; cursor: pointer; }
  </style>
</head>
<body>
  <div class="page-shell">
    <button class="back-button" onclick="goBack()">← Back</button>
    <div class="hero-card">
      <h1>Choose an event</h1>
      <p>Register for upcoming GDG sessions and become part of the community.</p>
    </div>
    <div id="events-container" class="events-grid"></div>
  </div>

  <div id="registration-modal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">&times;</span>
      <h3>Event Registration</h3>
      <form id="registration-form">
        <input type="hidden" id="event-name" name="event-name">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" required>
        </div>
        <div class="form-group">
          <label for="usn">USN</label>
          <input type="text" id="usn" required>
        </div>
        <div class="form-group">
          <label for="branch">Branch</label>
          <input type="text" id="branch" required>
        </div>
        <div class="form-group">
          <label for="mailid">Email</label>
          <input type="email" id="mailid" required>
        </div>
        <div class="form-group">
          <label for="phoneno">Phone</label>
          <input type="text" id="phoneno" required>
        </div>
        <div class="form-group">
          <label for="semester">Semester</label>
          <input type="number" id="semester" required>
        </div>
        <button type="submit">Submit registration</button>
      </form>
    </div>
  </div>

  <script>
    function goBack() {
      window.history.back();
    }

    function openModal(eventName) {
      document.getElementById('event-name').value = eventName;
      document.getElementById('registration-modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('registration-modal').style.display = 'none';
    }

    async function loadEvents() {
      const url = 'http://localhost:8080/api/upcomingEvents';
      const eventsContainer = document.getElementById('events-container');

      try {
        const response = await fetch(url, {
          method: 'GET',
          headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' }
        });

        if (!response.ok) throw new Error(`Error fetching events: ${response.status} ${response.statusText}`);

        const events = await response.json();
        eventsContainer.innerHTML = '';

        events.forEach((event) => {
          const card = document.createElement('article');
          card.className = 'event-card';
          card.innerHTML = `
            <h3>${event.event_name}</h3>
            <p>${event.description}</p>
            <p><strong>Date:</strong> ${new Date(event.date).toLocaleString()}</p>
            <p><strong>Location:</strong> ${event.location}</p>
            <button class="register-button" onclick="openModal('${event.event_name}')">Register</button>
          `;
          eventsContainer.appendChild(card);
        });
      } catch (error) {
        console.error('Failed to load events:', error);
        eventsContainer.innerHTML = '<p>Unable to load events right now.</p>';
      }
    }

    document.getElementById('registration-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const eventData = {
        event_name: document.getElementById('event-name').value,
        name: document.getElementById('name').value,
        usn: document.getElementById('usn').value,
        branch: document.getElementById('branch').value,
        mailid: document.getElementById('mailid').value,
        phoneno: document.getElementById('phoneno').value,
        semester: document.getElementById('semester').value
      };

      try {
        const response = await fetch('http://localhost:8080/gdg/EventRegister', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
          body: JSON.stringify(eventData)
        });

        if (!response.ok) throw new Error(`Error submitting form: ${response.status} ${response.statusText}`);
        alert('Registration submitted successfully!');
        closeModal();
        document.getElementById('registration-form').reset();
      } catch (error) {
        console.error('Failed to submit registration:', error);
        alert('Failed to submit registration. Please try again later.');
      }
    });

    document.addEventListener('DOMContentLoaded', loadEvents);
  </script>
</body>
</html>
