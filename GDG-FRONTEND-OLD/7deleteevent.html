<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delete Event</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #2563eb 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .form-container {
      width: min(100%, 380px);
      background: rgba(255,255,255,0.96);
      padding: 28px;
      border-radius: 24px;
      box-shadow: 0 20px 45px rgba(15, 23, 42, 0.22);
    }

    .form-title { margin: 0 0 8px; color: #111827; }
    .helper { color: #4b5563; margin-bottom: 16px; }
    label { display: block; margin-bottom: 6px; font-weight: 600; }
    input { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 12px; }
    .delete-button, .back-button { width: 100%; padding: 12px 14px; margin-top: 8px; border: 0; border-radius: 999px; font-weight: 700; cursor: pointer; }
    .delete-button { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }
    .back-button { background: #e5e7eb; color: #111827; }
  </style>
</head>
<body>
  <div class="form-container">
    <h2 class="form-title">Remove an event</h2>
    <p class="helper">Delete a past or canceled session from the event list.</p>
    <label for="event_name">Event Name</label>
    <input type="text" id="event_name" required>
    <button class="delete-button" onclick="deleteEvent()">Delete Event</button>
    <button class="back-button" onclick="goBack()">Back</button>
  </div>

  <script>
    function goBack() { window.history.back(); }

    async function deleteEvent() {
      const event_name = document.getElementById('event_name').value;
      const confirmDelete = confirm(`Are you sure you want to delete the event: ${event_name}?`);
      if (!confirmDelete) return;

      try {
        const response = await fetch('http://localhost:8080/api/events', {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
          body: JSON.stringify({ event_name })
        });

        if (response.ok) {
          alert(`Event "${event_name}" deleted successfully.`);
          document.getElementById('event_name').value = '';
        } else {
          throw new Error(`Failed to delete event: ${response.status} ${response.statusText}`);
        }
      } catch (error) {
        console.error('Error deleting event:', error);
        alert('Failed to delete event. Please try again later.');
      }
    }
  </script>
</body>
</html>
